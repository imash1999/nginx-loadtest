global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'fastapi-app1'
    static_configs:
      - targets: ['app1:8000']

  - job_name: 'fastapi-app2'
    static_configs:
      - targets: ['app2:8000']

  - job_name: 'fastapi-app3'
    static_configs:
      - targets: ['app3:8000']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
